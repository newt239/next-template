version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      timezone: "Asia/Tokyo"
      time: "08:00"
    target-branch: "main"
    cooldown:
      default-days: 1
    ignore:
      - dependency-name: "typescript"
        versions: [">=7.0.0 <7.1.0"]
    groups:
      all-dependencies:
        patterns:
          - "*"
